bio_before_timeline: >-
  <p style="margin-bottom: 5px;">
    I am a Ph.D. student at <a href="https://www.citymind.top/" target="_blank">CityMind Lab</a>, <u style="text-decoration-color: #999;">Hong Kong University of Science and Technology (GZ)</u>, supervised by <a href="https://yuxuanliang.com/" target="_blank">Prof. Yuxuan Liang</a>, <a href="https://facultyprofiles.hkust-gz.edu.cn/faculty-personal-page/YUE-Yang/yangyue" target="_blank">Prof. Yue Yang</a>, and <a href="https://www.cse.ust.hk/~yqsong/" target="_blank">Prof. Yangqiu Song</a>. I am also a visiting Ph.D. student at <a href="https://www.thuhpgc.net/" target="_blank">HPGC Research Group</a>, <u style="text-decoration-color: #999;">Tsinghua University</u>, supervised by <a href="https://www.thuhpgc.net/author/haohuan-fu/" target="_blank">Prof. Haohuan Fu</a>, and a visiting scholar at the National Supercomputing Center, Shenzhen. Previously, I obtained my M.Phil. from HKUST (GZ) and B.E. from <u style="text-decoration-color: #999;">Hefei University of Technology</u>.
  </p>
  <p style="margin-bottom: 5px;">
    My research focuses on Time Series Modeling, Spatio-Temporal Data Mining, and AI4Earth. I also collaborate with <a href="https://sites.google.com/site/qingsongwen8/" target="_blank">Dr. Qingsong Wen</a> @ Squirrel AI, <a href="https://www.comp.nus.edu.sg/cs/people/rogerz/" target="_blank">Prof. Roger Zimmermann</a> @ <u style="text-decoration-color: #999;">National University of Singapore</u>, <a href="https://zezhishao.github.io/" target="_blank">Prof. Zezhi Shao</a> @ <u style="text-decoration-color: #999;">Chinese Academy of Sciences</u>, and <a href="https://scholar.google.com/citations?user=frWRJN4AAAAJ" target="_blank">Prof. Shirui Pan</a> @ <u style="text-decoration-color: #999;">Griffith University</u>. Earlier, I interned at Huawei (supervised by <a href="https://scholar.google.com/citations?user=sNb24gkAAAAJ&hl=zh-CN&oi=sra" target="_blank">Dr. Hao Xu</a>), XPENG (supervised by <a href="https://www.linkedin.com/in/cheng-lu-5b24a739/" target="_blank">Dr. Cheng Lu</a>), and worked as a software engineer at Tencent (2022–2023).
  </p>

bio_after_timeline: >-
  <p style="margin-bottom: 5px;">
    I am passionate about building adaptive and practical spatio-temporal systems, translating research into deployable solutions that address real-world challenges.
  </p>
  <p style="margin-bottom: 5px;">
    <em style="color: red;">Feel free to reach out via email if you're interested in discussing research ideas or exploring potential collaborations!</em>
  </p>

