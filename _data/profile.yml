bio: >-
  <p style="margin-bottom: 5px;">
    Hi there, I'm Siru Zhong, a Ph.D. Candidate at <a href="https://dsa.hkust-gz.edu.cn/" target="_blank">The Hong Kong University of Science and Technology, Guangzhou</a>, advised by <a href="https://yuxuanliang.com/" target="_blank">Prof. Yuxuan Liang</a> and <a href="https://facultyprofiles.hkust-gz.edu.cn/faculty-personal-page/YUE-Yang/yangyue" target="_blank">Prof. Yang Yue</a>. I also hold visiting affiliations with <a href="https://www.tsinghua.edu.cn/" target="_blank">Tsinghua University</a> and the <a href="https://www.nsccsz.cn/" target="_blank">National Supercomputing Center in Shenzhen</a>, where I work with <a href="https://www.thuhpgc.net/author/haohuan-fu/" target="_blank">Prof. Haohuan Fu</a>. My research focuses on <em>Spatial-Temporal Intelligence, Time Series, and AI4Science</em>. I am also fortunate to be guided by <a href="https://scholar.google.com/citations?user=MdQZ-q8AAAAJ&hl=en" target="_blank">Prof. Yangqiu Song</a> and <a href="https://scholar.google.com/citations?user=iHevumsAAAAJ&hl=zh-CN" target="_blank">Prof. Jeffrey Xu Yu</a>. I am a consecutive recipient of the HKUST (GZ) DSA Excellent Research Award, a Tutorial Speaker for MM4ST @ MM 2025 & ICME 2026 and MM4TS @ AAAI 2026, and a reviewer/PC member for top venues including NeurIPS, ICLR, KDD, ACM MM, AAAI, PAKDD, IEEE TPAMI, and Neurocomputing.
  </p>

  <p style="margin-bottom: 5px;">
    Beyond academia, I intern at Beta Infinity (2026), working on Spatio-Temporal Memory in Embodied AI with <a href="https://scholar.google.com/citations?user=od00FfIAAAAJ" target="_blank">Dr. Wulong Liu</a>. At Huawei (2025), I worked on Spatio-Temporal Foundation Models deployed at scale for industry customers with <a href="https://scholar.google.com/citations?user=sNb24gkAAAAJ&hl=zh-CN&oi=sra" target="_blank">Dr. Hao Xu</a>. At XPENG (2024), I contributed to the XNGP Brain autonomous driving system with <a href="https://www.linkedin.com/in/cheng-lu-5b24a739/" target="_blank">Dr. Cheng Lu</a>. Earlier, I built automated workflow engines at Tencent (2021–2023), advancing from intern to full-time software engineer.
  </p>

