bio_before_timeline: >-
  <p style="margin-bottom: 5px;">
    I am a Ph.D. student in Data Science at <a href="https://www.citymind.top/" target="_blank">CityMind Lab</a>, The Hong Kong University of Science and Technology (Guangzhou), fortunate to be advised by <a href="https://yuxuanliang.com/" target="_blank">Prof. Yuxuan Liang</a>, <a href="https://facultyprofiles.hkust-gz.edu.cn/faculty-personal-page/YUE-Yang/yangyue" target="_blank">Prof. Yue Yang</a>, and <a href="https://www.cse.ust.hk/~yqsong/" target="_blank">Prof. Yangqiu Song</a>. I also hold visiting affiliations with <a href="https://www.thuhpgc.net/" target="_blank">HPGC Research Group</a> at Tsinghua University and the National Supercomputing Center, where I work with <a href="https://www.thuhpgc.net/author/haohuan-fu/" target="_blank">Prof. Haohuan Fu</a>. I am honored to be a consecutive recipient of the HKUST (GZ) DSA Excellent Research Award, a Tutorial Speaker for MM4ST @ MM 2025 & ICME 2026 and MM4TS @ AAAI 2026, and a reviewer/PC member for top venues including NeurIPS, ICLR, KDD, ACM MM, AAAI, PAKDD, IEEE TPAMI, and Neurocomputing. My research focuses on <strong>time series modeling, spatio-temporal data mining, and AI for Earth science</strong>—developing novel machine learning methods for understanding complex urban and environmental systems.
  </p>

bio_after_timeline: >-
  <p style="margin-bottom: 5px;">
    Beyond academia, I have built and deployed ML systems in industry. At Huawei (2025), my model was deployed at scale for industry customers under <a href="https://scholar.google.com/citations?user=sNb24gkAAAAJ&hl=zh-CN&oi=sra" target="_blank">Dr. Hao Xu</a>. At XPENG (2024), I contributed to the XNGP Brain autonomous driving system with <a href="https://www.linkedin.com/in/cheng-lu-5b24a739/" target="_blank">Dr. Cheng Lu</a>. Earlier, I built automated workflow engines at Tencent (2021–2023), advancing from intern to full-time software engineer. <em style="color: red;">Feel free to reach out via email if you're interested in exploring potential collaborations!</em>
  </p>

