<footer class="footer">
    <div class="container">
        <!-- Site Analytics -->
        <div class="row mb-3">
            <div class="col-12">
                <div class="text-center">
                    <div class="analytics-container">
                        <div class="clustrmap-container">
                            <script type="text/javascript" id="clustrmaps" src="//clustrmaps.com/map_v2.js?d=Uvq6cfvLuqUmf4KDhLMAeCNSkQS2WGYYFPTKcjP40&cl=ffffff&w=300&h=200"></script>
                        </div>
                        <div class="d-flex justify-content-around align-items-center flex-nowrap mt-3" style="padding: 0 2rem; gap: 1rem;">
                            <a href="https://www.tsinghua.edu.cn/" target="_blank" rel="noopener" class="text-decoration-none">
                                <img src="/assets/images/badges/THU.png" alt="Tsinghua University" style="height: 40px; object-fit: contain; opacity: 1;">
                            </a>
                            <a href="https://www.hkust-gz.edu.cn/" target="_blank" rel="noopener" class="text-decoration-none">
                                <img src="/assets/images/badges/HKUST_GZ_Logo.png" alt="HKUST(GZ)" style="height: 40px; object-fit: contain; opacity: 1;">
                            </a>
                            <a href="https://www.tencent.com/" target="_blank" rel="noopener" class="text-decoration-none">
                                <img src="/assets/images/badges/tencent_company.png" alt="Tencent" style="height: 35px; object-fit: contain; opacity: 1;">
                            </a>
                            <a href="https://www.xpeng.com/" target="_blank" rel="noopener" class="text-decoration-none">
                                <img src="/assets/images/badges/xpeng_company.png" alt="XPENG" style="height: 30px; object-fit: contain; opacity: 1;">
                            </a>
                            <a href="https://www.huawei.com/" target="_blank" rel="noopener" class="text-decoration-none">
                                <img src="/assets/images/badges/Huawei-Logo.png" alt="Huawei" style="height: 35px; object-fit: contain; opacity: 1;">
                            </a>
                            <a href="http://www.nsccsz.cn/" target="_blank" rel="noopener" class="text-decoration-none">
                                <img src="/assets/images/badges/nscc.png" alt="National Supercomputing Center Shenzhen" style="height: 40px; object-fit: contain; opacity: 1;">
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Original Footer Content -->
        <div class="row my-3">
            <div class="col-6">
                <div class="text-muted">
                    <i>Last updated: {{ "now" | date: "%b %Y" }}</i>
                </div>
            </div>
            <div class="col-6">
                <div class="text-right text-muted">
                    {{ site.data.display.footer_text }}
                </div>
            </div>
        </div>
    </div>
</footer>
